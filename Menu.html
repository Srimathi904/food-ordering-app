<!DOCTYPE html>
<html>
<head>
    <title>Food Menu</title>
    <link rel="stylesheet" href="second.css">
</head>
<body>

    <h1 class="title">Our Menu</h1>

    <div class="menu-container">

        <div class="card">
            <img src="burger.jpeg" alt="Burger">
            <h3>Burger</h3>
            <p>₹120</p>
        </div>

        <div class="card">
            <img src="pizza.jpeg" alt="Pizza">
            <h3>Pizza</h3>
            <p>₹250</p>
        </div>

        <div class="card">
            <img src="fries.jpeg" alt="French Fries">
            <h3>French Fries</h3>
            <p>₹90</p>
        </div>

        <div class="card">
            <img src="sandwich.jpeg" alt="Sandwich">
            <h3>Sandwich</h3>
            <p>₹110</p>
        </div>

        <div class="card">
            <img src="pasta.jpeg" alt="Pasta">
            <h3>Pasta</h3>
            <p>₹180</p>
        </div>

        <div class="card">
            <img src="noodle.jpeg" alt="Noodles">
            <h3>Noodles</h3>
            <p>₹160</p>
        </div>

        <div class="card">
            <img src="iccrm.jpeg" alt="Ice Cream">
            <h3>Ice Cream</h3>
            <p>₹80</p>
        </div>

        <div class="card">
            <img src="juice.jpeg" alt="Juice">
            <h3>Juice</h3>
            <p>₹70</p>
        </div>

        <div class="card">
            <img src="coffe.jpeg" alt="Coffee">
            <h3>Coffee</h3>
            <p>₹60</p>
        </div>

    </div>

</body>
</html>
